<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damas Clean - Gerador de Orçamento</title>
    <meta name="description" content="Sistema de geração de orçamentos profissionais da Damas Clean - Higienização de Estofados">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ============================================
           RESET & VARIABLES
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --azul-escuro: #1A3C5E;
            --azul-medio: #2D6A9F;
            --azul-claro: #D5E8F0;
            --cinza-claro: #F4F6F9;
            --verde: #1E6B3C;
            --branco: #FFFFFF;
            --texto: #2c3e50;
            --texto-secundario: #6c7a89;
            --sombra: 0 4px 24px rgba(26, 60, 94, 0.10);
            --sombra-hover: 0 8px 32px rgba(26, 60, 94, 0.18);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, var(--cinza-claro) 50%, #dce6f0 100%);
            color: var(--texto);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul-medio) 100%);
            padding: 20px 0;
            color: var(--branco);
            box-shadow: 0 4px 20px rgba(26, 60, 94, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--branco);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .header-info h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header-info p {
            font-size: 0.82rem;
            opacity: 0.85;
            font-weight: 300;
        }

        /* ============================================
           MAIN CONTAINER
           ============================================ */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* ============================================
           SECTIONS / CARDS
           ============================================ */
        .section {
            background: var(--branco);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: var(--sombra);
            transition: var(--transition);
            border: 1px solid rgba(26, 60, 94, 0.06);
        }

        .section:hover {
            box-shadow: var(--sombra-hover);
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--azul-escuro);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--azul-claro), #c0ddf0);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* ============================================
           FORM GRID
           ============================================ */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--texto-secundario);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--cinza-claro);
            color: var(--texto);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--azul-medio);
            background: var(--branco);
            box-shadow: 0 0 0 3px rgba(45, 106, 159, 0.12);
        }

        .form-group input[readonly] {
            background: #edf2f7;
            color: var(--texto-secundario);
            cursor: default;
        }

        /* ============================================
           SERVICES TABLE
           ============================================ */
        .services-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .services-table thead th {
            background: var(--azul-escuro);
            color: var(--branco);
            padding: 14px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: left;
        }

        .services-table thead th:first-child {
            width: 40px;
            text-align: center;
        }

        .services-table thead th:nth-child(3),
        .services-table thead th:nth-child(4),
        .services-table thead th:nth-child(5) {
            text-align: center;
        }

        .services-table tbody tr {
            transition: var(--transition);
        }

        .services-table tbody tr:nth-child(even) {
            background: var(--cinza-claro);
        }

        .services-table tbody tr:nth-child(odd) {
            background: var(--branco);
        }

        .services-table tbody tr:hover {
            background: var(--azul-claro);
        }

        .services-table tbody tr.selected {
            background: rgba(30, 107, 60, 0.06);
        }

        .services-table tbody td {
            padding: 12px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }

        .services-table tbody td:first-child {
            text-align: center;
        }

        .services-table tbody td:nth-child(3),
        .services-table tbody td:nth-child(4),
        .services-table tbody td:nth-child(5) {
            text-align: center;
        }

        .services-table .service-name {
            font-weight: 500;
        }

        .services-table .service-price {
            font-weight: 600;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        .services-table .service-total {
            font-weight: 700;
            color: var(--verde);
            white-space: nowrap;
        }

        /* Custom checkbox */
        .custom-checkbox {
            position: relative;
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .custom-checkbox input {
            opacity: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        .custom-checkbox .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            width: 22px;
            height: 22px;
            background: var(--cinza-claro);
            border: 2px solid #cbd5e0;
            border-radius: 5px;
            transition: var(--transition);
        }

        .custom-checkbox input:checked + .checkmark {
            background: var(--verde);
            border-color: var(--verde);
        }

        .custom-checkbox input:checked + .checkmark::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 6px;
            width: 6px;
            height: 10px;
            border: solid var(--branco);
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        /* Quantity input */
        .qty-input {
            width: 56px;
            padding: 6px 4px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--azul-escuro);
            background: var(--branco);
            transition: var(--transition);
        }

        .qty-input:focus {
            outline: none;
            border-color: var(--azul-medio);
            box-shadow: 0 0 0 3px rgba(45, 106, 159, 0.12);
        }

        /* ============================================
           SUMMARY BOX
           ============================================ */
        .summary-box {
            background: var(--cinza-claro);
            border-radius: 10px;
            padding: 20px 24px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 0.95rem;
        }

        .summary-row:not(:last-child) {
            border-bottom: 1px solid #e2e8f0;
        }

        .summary-row .label {
            color: var(--texto-secundario);
            font-weight: 500;
        }

        .summary-row .value {
            font-weight: 700;
            color: var(--azul-escuro);
            font-size: 1.05rem;
        }

        .summary-row.discount .label {
            color: var(--verde);
        }

        .summary-row.discount .value {
            color: var(--verde);
        }

        .summary-row.installment .label {
            color: var(--azul-medio);
        }

        .summary-row.installment .value {
            color: var(--azul-medio);
        }

        .summary-total {
            background: var(--azul-escuro);
            color: var(--branco);
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-total .label {
            font-size: 1rem;
            font-weight: 600;
        }

        .summary-total .value {
            font-size: 1.4rem;
            font-weight: 800;
        }

        /* ============================================
           BUTTONS
           ============================================ */
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            min-width: 160px;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--verde), #237a46);
            color: var(--branco);
            box-shadow: 0 4px 16px rgba(30, 107, 60, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(30, 107, 60, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--azul-medio), var(--azul-escuro));
            color: var(--branco);
            box-shadow: 0 4px 16px rgba(45, 106, 159, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(45, 106, 159, 0.4);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .btn-outline {
            background: var(--branco);
            color: var(--azul-escuro);
            border: 2px solid #d0d8e0;
        }

        .btn-outline:hover {
            border-color: var(--azul-medio);
            background: var(--cinza-claro);
            transform: translateY(-2px);
        }

        .btn-outline:active {
            transform: translateY(0);
        }

        /* ============================================
           PREVIEW MODAL
           ============================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 60, 94, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--branco);
            border-radius: 16px;
            width: 100%;
            max-width: 680px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--branco);
            border-radius: 16px 16px 0 0;
            z-index: 10;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            color: var(--azul-escuro);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--cinza-claro);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: var(--texto-secundario);
        }

        .modal-close:hover {
            background: #e2e8f0;
            color: var(--texto);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ============================================
           PREVIEW STYLES
           ============================================ */
        .preview-container {
            background: var(--branco);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 30px 25px;
            font-size: 0.82rem;
            line-height: 1.5;
        }

        .preview-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--azul-claro);
        }

        .preview-header .company-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--azul-escuro);
            margin-bottom: 4px;
        }

        .preview-header .company-contact {
            font-size: 0.75rem;
            color: var(--texto-secundario);
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 0.78rem;
        }

        .preview-table th {
            background: var(--azul-escuro);
            color: var(--branco);
            padding: 8px 10px;
            font-weight: 600;
            text-align: left;
            font-size: 0.74rem;
        }

        .preview-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #edf2f7;
        }

        .preview-table tr:nth-child(even) td {
            background: var(--cinza-claro);
        }

        .preview-client-box {
            background: var(--cinza-claro);
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.78rem;
        }

        .preview-client-box p {
            margin-bottom: 3px;
        }

        .preview-client-box strong {
            color: var(--azul-escuro);
        }

        .preview-summary {
            text-align: right;
            margin-bottom: 14px;
        }

        .preview-summary p {
            margin-bottom: 3px;
            font-size: 0.8rem;
        }

        .preview-total-box {
            background: var(--azul-escuro);
            color: var(--branco);
            padding: 12px 16px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .preview-total-box .total-label {
            font-weight: 600;
        }

        .preview-total-box .total-value {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .preview-payment {
            background: var(--cinza-claro);
            padding: 10px 14px;
            border-radius: 6px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            font-size: 0.72rem;
            font-weight: 500;
            text-align: center;
        }

        .preview-payment span {
            padding: 4px 10px;
            background: var(--branco);
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .preview-obs {
            font-size: 0.7rem;
            color: var(--texto-secundario);
            margin-bottom: 14px;
            padding: 10px;
            border-left: 3px solid var(--azul-claro);
            background: rgba(213, 232, 240, 0.2);
            border-radius: 0 4px 4px 0;
        }

        .preview-footer {
            text-align: center;
            padding-top: 12px;
            border-top: 2px solid var(--azul-claro);
            font-size: 0.7rem;
            color: var(--texto-secundario);
        }

        /* ============================================
           TOAST NOTIFICATIONS
           ============================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--verde);
            color: var(--branco);
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 2000;
            display: none;
            animation: slideUp 0.3s ease;
        }

        .toast.error {
            background: #c0392b;
        }

        .toast.show {
            display: block;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 680px) {
            .header-content {
                gap: 12px;
            }

            .header-logo {
                width: 44px;
                height: 44px;
            }

            .header-info h1 {
                font-size: 1.05rem;
            }

            .container {
                padding: 16px 12px 32px;
            }

            .section {
                padding: 20px 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .services-table {
                display: block;
                overflow-x: auto;
            }

            .services-table thead th,
            .services-table tbody td {
                padding: 10px 10px;
                font-size: 0.8rem;
            }

            .qty-input {
                width: 46px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                min-width: unset;
            }

            .summary-total .value {
                font-size: 1.2rem;
            }

            .modal {
                max-width: 100%;
                max-height: 95vh;
                border-radius: 12px;
            }

            .preview-payment {
                flex-direction: column;
                align-items: stretch;
            }

            .toast {
                left: 16px;
                right: 16px;
                bottom: 16px;
                text-align: center;
            }
        }

        /* ============================================
           SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cinza-claro);
        }

        ::-webkit-scrollbar-thumb {
            background: #b0c4d8;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--azul-medio);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div class="header-logo">
                <img src="assents/Damas.png" alt="Damas Clean Logo" onerror="this.parentElement.innerHTML='🧹'">
            </div>
            <div class="header-info">
                <h1>Damas Clean</h1>
                <p>Gerador de Orçamento Profissional</p>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container">

        <!-- DADOS DO ORÇAMENTO -->
        <div class="section" id="sectionDados">
            <div class="section-title">
                <span class="icon">📋</span>
                Dados do Orçamento
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="numOrcamento">Nº do Orçamento</label>
                    <input type="text" id="numOrcamento" readonly>
                </div>
                <div class="form-group">
                    <label for="dataEmissao">Data de Emissão</label>
                    <input type="text" id="dataEmissao" readonly>
                </div>
                <div class="form-group">
                    <label for="dataValidade">Data de Validade</label>
                    <input type="text" id="dataValidade" readonly>
                </div>
            </div>
        </div>

        <!-- DADOS DO CLIENTE -->
        <div class="section" id="sectionCliente">
            <div class="section-title">
                <span class="icon">👤</span>
                Dados do Cliente
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="nomeCliente">Nome Completo</label>
                    <input type="text" id="nomeCliente" placeholder="Nome do cliente">
                </div>
                <div class="form-group">
                    <label for="telefoneCliente">Telefone / WhatsApp</label>
                    <input type="tel" id="telefoneCliente" placeholder="(31) 99999-9999">
                </div>
                <div class="form-group full-width">
                    <label for="enderecoCliente">Endereço / Bairro</label>
                    <input type="text" id="enderecoCliente" placeholder="Rua, nº, Bairro - Cidade">
                </div>
            </div>
        </div>

        <!-- TABELA DE SERVIÇOS -->
        <div class="section" id="sectionServicos">
            <div class="section-title">
                <span class="icon">🛋️</span>
                Serviços Disponíveis
            </div>
            <table class="services-table" id="servicesTable">
                <thead>
                    <tr>
                        <th></th>
                        <th>Serviço</th>
                        <th>Qtd</th>
                        <th>Valor Unit.</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="servicesBody">
                    <!-- Populated by JS -->
                </tbody>
            </table>

            <!-- RESUMO -->
            <div class="summary-box">
                <div class="summary-row">
                    <span class="label">Subtotal</span>
                    <span class="value" id="subtotal">R$ 0,00</span>
                </div>
                <div class="summary-row discount">
                    <span class="label">💰 Desconto PIX (5%)</span>
                    <span class="value" id="descontoPix">− R$ 0,00</span>
                </div>
                <div class="summary-row installment">
                    <span class="label">💳 Parcelamento 4x s/ juros</span>
                    <span class="value" id="parcela4x">4x R$ 0,00</span>
                </div>
            </div>
            <div class="summary-total">
                <span class="label">Total a Pagar</span>
                <span class="value" id="totalFinal">R$ 0,00</span>
            </div>
        </div>

        <!-- BOTÕES -->
        <div class="actions">
            <button class="btn btn-primary" onclick="gerarPDF()" id="btnGerarPDF">
                📥 Gerar PDF
            </button>
            <button class="btn btn-secondary" onclick="preVisualizar()" id="btnPreview">
                👁️ Pré-visualizar
            </button>
            <button class="btn btn-outline" onclick="limparFormulario()" id="btnLimpar">
                🗑️ Limpar Formulário
            </button>
        </div>
    </main>

    <!-- MODAL DE PREVIEW -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Pré-visualização do Orçamento</h2>
                <button class="modal-close" onclick="fecharPreview()">✕</button>
            </div>
            <div class="modal-body" id="previewBody">
                <!-- Preview content injected by JS -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="fecharPreview()" style="flex:0;">Fechar</button>
                <button class="btn btn-primary" onclick="fecharPreview(); gerarPDF();" style="flex:0;">📥 Gerar PDF</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- ============================================
         JAVASCRIPT
         ============================================ -->
    <script>
        // ---- DATA & SERVICES ----
        const SERVICES = [
            { name: 'Sofá 2 lugares', price: 220 },
            { name: 'Sofá 3 lugares', price: 280 },
            { name: 'Sofá retrátil / chaise', price: 320 },
            { name: 'Sofá em L (canto)', price: 380 },
            { name: 'Sofá 4 lugares ou mais', price: 420 },
            { name: 'Colchão solteiro', price: 180 },
            { name: 'Colchão casal', price: 250 },
            { name: 'Colchão queen', price: 280 },
            { name: 'Colchão king', price: 300 },
            { name: 'Poltrona', price: 100 },
            { name: 'Cadeira estofada', price: 60 },
            { name: 'Banco de carro completo', price: 450 },
        ];

        const PIX_DISCOUNT = 0.05;
        const INSTALLMENTS = 4;
        const VALIDITY_DAYS = 7;

        // ---- INIT ----
        document.addEventListener('DOMContentLoaded', () => {
            generateBudgetNumber();
            setDates();
            renderServicesTable();
            applyPhoneMask();
        });

        // ---- BUDGET NUMBER ----
        function generateBudgetNumber() {
            const now = new Date();
            const num = `DC-${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${String(Math.floor(Math.random() * 9000) + 1000)}`;
            document.getElementById('numOrcamento').value = num;
        }

        // ---- DATES ----
        function setDates() {
            const now = new Date();
            const validade = new Date(now);
            validade.setDate(validade.getDate() + VALIDITY_DAYS);

            document.getElementById('dataEmissao').value = formatDate(now);
            document.getElementById('dataValidade').value = formatDate(validade);
        }

        function formatDate(date) {
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        // ---- PHONE MASK ----
        function applyPhoneMask() {
            const input = document.getElementById('telefoneCliente');
            input.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 11) v = v.substring(0, 11);
                if (v.length > 6) {
                    v = `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`;
                } else if (v.length > 2) {
                    v = `(${v.substring(0,2)}) ${v.substring(2)}`;
                } else if (v.length > 0) {
                    v = `(${v}`;
                }
                e.target.value = v;
            });
        }

        // ---- RENDER SERVICES TABLE ----
        function renderServicesTable() {
            const tbody = document.getElementById('servicesBody');
            tbody.innerHTML = '';

            SERVICES.forEach((svc, i) => {
                const tr = document.createElement('tr');
                tr.id = `serviceRow_${i}`;
                tr.innerHTML = `
                    <td>
                        <label class="custom-checkbox">
                            <input type="checkbox" id="check_${i}" onchange="onServiceChange(${i})">
                            <span class="checkmark"></span>
                        </label>
                    </td>
                    <td class="service-name">${svc.name}</td>
                    <td>
                        <input type="number" class="qty-input" id="qty_${i}" value="1" min="1" max="20" onchange="onServiceChange(${i})" oninput="onServiceChange(${i})">
                    </td>
                    <td class="service-price">${formatCurrency(svc.price)}</td>
                    <td class="service-total" id="total_${i}">R$ 0,00</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ---- CALCULATIONS ----
        function onServiceChange(index) {
            const checked = document.getElementById(`check_${index}`).checked;
            const qty = parseInt(document.getElementById(`qty_${index}`).value) || 1;
            const row = document.getElementById(`serviceRow_${index}`);
            const totalEl = document.getElementById(`total_${index}`);

            if (checked) {
                const total = SERVICES[index].price * qty;
                totalEl.textContent = formatCurrency(total);
                row.classList.add('selected');
            } else {
                totalEl.textContent = 'R$ 0,00';
                row.classList.remove('selected');
            }

            updateSummary();
        }

        function updateSummary() {
            let subtotal = 0;

            SERVICES.forEach((svc, i) => {
                const checked = document.getElementById(`check_${i}`).checked;
                if (checked) {
                    const qty = parseInt(document.getElementById(`qty_${i}`).value) || 1;
                    subtotal += svc.price * qty;
                }
            });

            const desconto = subtotal * PIX_DISCOUNT;
            const totalComPix = subtotal - desconto;
            const parcela = subtotal / INSTALLMENTS;

            document.getElementById('subtotal').textContent = formatCurrency(subtotal);
            document.getElementById('descontoPix').textContent = `− ${formatCurrency(desconto)}`;
            document.getElementById('parcela4x').textContent = `4x ${formatCurrency(parcela)}`;
            document.getElementById('totalFinal').textContent = formatCurrency(subtotal);
        }

        function getSelectedServices() {
            const selected = [];
            SERVICES.forEach((svc, i) => {
                if (document.getElementById(`check_${i}`).checked) {
                    const qty = parseInt(document.getElementById(`qty_${i}`).value) || 1;
                    selected.push({
                        name: svc.name,
                        price: svc.price,
                        qty: qty,
                        total: svc.price * qty
                    });
                }
            });
            return selected;
        }

        // ---- FORMAT ----
        function formatCurrency(value) {
            return 'R$ ' + value.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ---- TOAST ----
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.className = 'toast', 3000);
        }

        // ---- VALIDATION ----
        function validate() {
            const nome = document.getElementById('nomeCliente').value.trim();
            const services = getSelectedServices();

            if (!nome) {
                showToast('Preencha o nome do cliente.', true);
                document.getElementById('nomeCliente').focus();
                return false;
            }

            if (services.length === 0) {
                showToast('Selecione ao menos um serviço.', true);
                return false;
            }

            return true;
        }

        // ---- CLEAR ----
        function limparFormulario() {
            document.getElementById('nomeCliente').value = '';
            document.getElementById('telefoneCliente').value = '';
            document.getElementById('enderecoCliente').value = '';

            SERVICES.forEach((_, i) => {
                document.getElementById(`check_${i}`).checked = false;
                document.getElementById(`qty_${i}`).value = 1;
                document.getElementById(`total_${i}`).textContent = 'R$ 0,00';
                document.getElementById(`serviceRow_${i}`).classList.remove('selected');
            });

            generateBudgetNumber();
            setDates();
            updateSummary();
            showToast('Formulário limpo com sucesso!');
        }

        // ---- PREVIEW ----
        function preVisualizar() {
            if (!validate()) return;
            const html = buildPreviewHTML();
            document.getElementById('previewBody').innerHTML = html;
            document.getElementById('previewModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function fecharPreview() {
            document.getElementById('previewModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal on overlay click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) fecharPreview();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') fecharPreview();
        });

        function buildPreviewHTML() {
            const services = getSelectedServices();
            const subtotal = services.reduce((s, sv) => s + sv.total, 0);
            const desconto = subtotal * PIX_DISCOUNT;
            const totalPix = subtotal - desconto;
            const parcela = subtotal / INSTALLMENTS;

            let serviceRows = '';
            services.forEach((sv, i) => {
                serviceRows += `
                    <tr>
                        <td>${sv.name}</td>
                        <td style="text-align:center">${sv.qty}</td>
                        <td style="text-align:center">${formatCurrency(sv.price)}</td>
                        <td style="text-align:center;color:#1E6B3C;font-weight:700">${formatCurrency(sv.total)}</td>
                    </tr>`;
            });

            return `
            <div class="preview-container">
                <div class="preview-header">
                    <div class="company-name">Damas Clean · Higienização de Estofados</div>
                    <div class="company-contact">
                        WhatsApp: (31) 9971-0420 · Instagram: @damas_clean
                    </div>
                </div>

                <table class="preview-table">
                    <thead>
                        <tr>
                            <th>Orçamento</th>
                            <th>Data</th>
                            <th>Validade</th>
                            <th>Valor Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${document.getElementById('numOrcamento').value}</td>
                            <td>${document.getElementById('dataEmissao').value}</td>
                            <td>${document.getElementById('dataValidade').value}</td>
                            <td style="color:#2D6A9F;font-weight:800">${formatCurrency(subtotal)}</td>
                        </tr>
                    </tbody>
                </table>

                <div class="preview-client-box">
                    <p><strong>Cliente:</strong> ${document.getElementById('nomeCliente').value}</p>
                    <p><strong>Telefone:</strong> ${document.getElementById('telefoneCliente').value || '—'}</p>
                    <p><strong>Endereço:</strong> ${document.getElementById('enderecoCliente').value || '—'}</p>
                </div>

                <table class="preview-table">
                    <thead>
                        <tr>
                            <th>Serviço</th>
                            <th style="text-align:center">Qtd</th>
                            <th style="text-align:center">Valor Unit.</th>
                            <th style="text-align:center">Valor Total</th>
                        </tr>
                    </thead>
                    <tbody>${serviceRows}</tbody>
                </table>

                <div class="preview-summary">
                    <p><strong>Subtotal:</strong> ${formatCurrency(subtotal)}</p>
                    <p style="color:#1E6B3C"><strong>Desconto PIX (5%):</strong> − ${formatCurrency(desconto)}</p>
                    <p style="color:#2D6A9F"><strong>4x sem juros:</strong> ${formatCurrency(parcela)}/parcela</p>
                </div>

                <div class="preview-total-box">
                    <span class="total-label">Total a Pagar</span>
                    <span class="total-value">${formatCurrency(subtotal)}</span>
                </div>

                <div class="preview-payment">
                    <span>💰 PIX (5% desc.)</span>
                    <span>💵 Dinheiro</span>
                    <span>💳 Débito</span>
                    <span>💳 Crédito 4x s/ juros</span>
                </div>

                <div class="preview-obs">
                    Este orçamento tem validade de 7 dias. O agendamento será confirmado após contato via WhatsApp. Atendemos em domicílio em BH e região.
                </div>

                <div class="preview-footer">
                    Damas Clean · Higienização Profissional de Estofados · BH e Região<br>
                    WhatsApp: (31) 9971-0420 · contato@damasclean.com.br
                </div>
            </div>`;
        }

        // ==================================================
        //  PDF GENERATION WITH jsPDF
        // ==================================================
        function gerarPDF() {
            if (!validate()) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const W = 210;
            const margin = 18;
            const contentW = W - margin * 2;
            let y = 18;

            const AZUL_ESCURO  = [26, 60, 94];
            const AZUL_MEDIO   = [45, 106, 159];
            const AZUL_CLARO   = [213, 232, 240];
            const CINZA_CLARO  = [244, 246, 249];
            const VERDE        = [30, 107, 60];
            const BRANCO       = [255, 255, 255];
            const TEXTO        = [44, 62, 80];
            const TEXTO_SEC    = [108, 122, 137];

            const services = getSelectedServices();
            const subtotal = services.reduce((s, sv) => s + sv.total, 0);
            const desconto = subtotal * PIX_DISCOUNT;
            const totalPix = subtotal - desconto;
            const parcela  = subtotal / INSTALLMENTS;

            // ---- HELPER FUNCTIONS ----
            function setFont(style, size, color) {
                doc.setFont('helvetica', style);
                doc.setFontSize(size);
                doc.setTextColor(...color);
            }

            function drawRect(x, yy, w, h, color, radius) {
                doc.setFillColor(...color);
                if (radius) {
                    doc.roundedRect(x, yy, w, h, radius, radius, 'F');
                } else {
                    doc.rect(x, yy, w, h, 'F');
                }
            }

            // ---- HEADER ----
            // Logo circle placeholder
            const logoSize = 14;
            doc.setFillColor(...AZUL_CLARO);
            doc.circle(margin + logoSize / 2, y + logoSize / 2, logoSize / 2, 'F');

            // Try to load the logo image
            try {
                const logoImg = document.querySelector('.header-logo img');
                if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 200;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(logoImg, 0, 0, 200, 200);
                    const imgData = canvas.toDataURL('image/png');
                    doc.addImage(imgData, 'PNG', margin, y, logoSize, logoSize);
                }
            } catch (e) { /* logo not available, circle stays */ }

            setFont('bold', 15, AZUL_ESCURO);
            doc.text('Damas Clean', margin + logoSize + 5, y + 5);

            setFont('normal', 9, AZUL_MEDIO);
            doc.text('Higienização de Estofados', margin + logoSize + 5, y + 10);

            setFont('normal', 7.5, TEXTO_SEC);
            doc.text('WhatsApp: (31) 9971-0420  ·  Instagram: @damas_clean', margin + logoSize + 5, y + 14.5);

            y += logoSize + 4;

            // Separator line
            doc.setDrawColor(...AZUL_CLARO);
            doc.setLineWidth(0.8);
            doc.line(margin, y, W - margin, y);
            y += 6;

            // ---- BUDGET INFO TABLE ----
            const infoCols = [contentW * 0.28, contentW * 0.22, contentW * 0.22, contentW * 0.28];
            const infoHeaders = ['Orçamento', 'Data', 'Validade', 'Valor Total'];
            const infoValues = [
                document.getElementById('numOrcamento').value,
                document.getElementById('dataEmissao').value,
                document.getElementById('dataValidade').value,
                formatCurrency(subtotal)
            ];
            const rowH = 9;

            // Header row
            drawRect(margin, y, contentW, rowH, AZUL_ESCURO);
            setFont('bold', 7.5, BRANCO);
            let xPos = margin;
            infoHeaders.forEach((h, i) => {
                doc.text(h, xPos + infoCols[i] / 2, y + rowH / 2 + 1, { align: 'center' });
                xPos += infoCols[i];
            });
            y += rowH;

            // Data row
            drawRect(margin, y, contentW, rowH, BRANCO);
            doc.setDrawColor(220, 225, 230);
            doc.setLineWidth(0.3);
            doc.rect(margin, y, contentW, rowH, 'S');
            setFont('normal', 8, TEXTO);
            xPos = margin;
            infoValues.forEach((v, i) => {
                if (i === 3) {
                    setFont('bold', 9, AZUL_MEDIO);
                }
                doc.text(v, xPos + infoCols[i] / 2, y + rowH / 2 + 1, { align: 'center' });
                if (i === 3) setFont('normal', 8, TEXTO);
                xPos += infoCols[i];
            });
            y += rowH + 6;

            // ---- CLIENT BLOCK ----
            const clientH = 22;
            drawRect(margin, y, contentW, clientH, CINZA_CLARO, 3);
            setFont('bold', 7.5, AZUL_ESCURO);
            doc.text('Cliente:', margin + 6, y + 6);
            doc.text('Telefone:', margin + 6, y + 12);
            doc.text('Endereço:', margin + 6, y + 18);

            setFont('normal', 8, TEXTO);
            doc.text(document.getElementById('nomeCliente').value, margin + 28, y + 6);
            doc.text(document.getElementById('telefoneCliente').value || '—', margin + 28, y + 12);

            const endereco = document.getElementById('enderecoCliente').value || '—';
            const enderecoLines = doc.splitTextToSize(endereco, contentW - 34);
            doc.text(enderecoLines[0], margin + 30, y + 18);
            y += clientH + 6;

            // ---- SERVICES TABLE ----
            const svcCols = [contentW * 0.42, contentW * 0.14, contentW * 0.22, contentW * 0.22];
            const svcHeaders = ['Serviço', 'Qtd', 'Valor Unit.', 'Valor Total'];
            const svcRowH = 8;

            // Header
            drawRect(margin, y, contentW, svcRowH, AZUL_ESCURO);
            setFont('bold', 7.5, BRANCO);
            xPos = margin;
            svcHeaders.forEach((h, i) => {
                const align = i === 0 ? 'left' : 'center';
                const tx = i === 0 ? xPos + 4 : xPos + svcCols[i] / 2;
                doc.text(h, tx, y + svcRowH / 2 + 1, { align });
                xPos += svcCols[i];
            });
            y += svcRowH;

            // Rows
            services.forEach((sv, idx) => {
                const bg = idx % 2 === 0 ? BRANCO : CINZA_CLARO;
                drawRect(margin, y, contentW, svcRowH, bg);

                // Draw vertical lines
                doc.setDrawColor(220, 225, 230);
                doc.setLineWidth(0.2);
                let lineX = margin;
                svcCols.forEach((cw) => {
                    lineX += cw;
                    if (lineX < W - margin) {
                        doc.line(lineX, y, lineX, y + svcRowH);
                    }
                });

                // Bottom border
                doc.line(margin, y + svcRowH, W - margin, y + svcRowH);

                // Service name
                setFont('normal', 8, TEXTO);
                doc.text(sv.name, margin + 4, y + svcRowH / 2 + 1);

                // Quantity
                setFont('normal', 8, TEXTO);
                doc.text(String(sv.qty), margin + svcCols[0] + svcCols[1] / 2, y + svcRowH / 2 + 1, { align: 'center' });

                // Unit price
                setFont('normal', 8, TEXTO);
                doc.text(formatCurrency(sv.price), margin + svcCols[0] + svcCols[1] + svcCols[2] / 2, y + svcRowH / 2 + 1, { align: 'center' });

                // Total
                setFont('bold', 8, VERDE);
                doc.text(formatCurrency(sv.total), margin + svcCols[0] + svcCols[1] + svcCols[2] + svcCols[3] / 2, y + svcRowH / 2 + 1, { align: 'center' });

                y += svcRowH;
            });

            y += 6;

            // ---- SUMMARY ----
            const summaryX = W - margin - 80;

            setFont('normal', 8, TEXTO_SEC);
            doc.text('Subtotal:', summaryX, y);
            setFont('bold', 9, AZUL_ESCURO);
            doc.text(formatCurrency(subtotal), W - margin, y, { align: 'right' });
            y += 6;

            setFont('normal', 8, VERDE);
            doc.text('Desconto PIX (5%):', summaryX, y);
            setFont('bold', 8.5, VERDE);
            doc.text(`− ${formatCurrency(desconto)}`, W - margin, y, { align: 'right' });
            y += 6;

            setFont('normal', 8, AZUL_MEDIO);
            doc.text('Crédito 4x sem juros:', summaryX, y);
            setFont('bold', 8.5, AZUL_MEDIO);
            doc.text(`${formatCurrency(parcela)}/parcela`, W - margin, y, { align: 'right' });
            y += 8;

            // Total box
            const totalBoxH = 12;
            drawRect(margin, y, contentW, totalBoxH, AZUL_ESCURO, 3);
            setFont('bold', 10, BRANCO);
            doc.text('Total a Pagar', margin + 8, y + totalBoxH / 2 + 1.5);
            setFont('bold', 14, BRANCO);
            doc.text(formatCurrency(subtotal), W - margin - 8, y + totalBoxH / 2 + 2, { align: 'right' });
            y += totalBoxH + 8;

            // ---- PAYMENT METHODS ----
            const payH = 10;
            drawRect(margin, y, contentW, payH, CINZA_CLARO, 3);
            setFont('normal', 7, TEXTO_SEC);
            const payments = ['💰 PIX (5% desc.)', '💵 Dinheiro', '💳 Débito', '💳 Crédito 4x s/ juros'];
            // Since emojis may not render in PDF, use text-only versions
            const payTexts = ['PIX (5% desc.)', 'Dinheiro', 'Débito', 'Crédito 4x s/ juros'];
            const payW = contentW / payTexts.length;
            payTexts.forEach((p, i) => {
                const px = margin + payW * i + payW / 2;
                doc.text(p, px, y + payH / 2 + 1, { align: 'center' });
                if (i < payTexts.length - 1) {
                    doc.setDrawColor(200, 205, 210);
                    doc.setLineWidth(0.2);
                    doc.line(margin + payW * (i + 1), y + 2, margin + payW * (i + 1), y + payH - 2);
                }
            });
            y += payH + 6;

            // ---- OBSERVATION ----
            setFont('italic', 7.5, TEXTO_SEC);
            const obsText = 'Este orçamento tem validade de 7 dias. O agendamento será confirmado após contato via WhatsApp. Atendemos em domicílio em BH e região.';
            const obsLines = doc.splitTextToSize(obsText, contentW - 8);
            doc.setDrawColor(...AZUL_CLARO);
            doc.setLineWidth(1);
            doc.line(margin, y, margin, y + obsLines.length * 4.5);
            doc.text(obsLines, margin + 5, y + 3);
            y += obsLines.length * 4.5 + 8;

            // ---- FOOTER ----
            doc.setDrawColor(...AZUL_CLARO);
            doc.setLineWidth(0.6);
            doc.line(margin, y, W - margin, y);
            y += 5;

            setFont('normal', 7, TEXTO_SEC);
            doc.text('Damas Clean · Higienização Profissional de Estofados · BH e Região', W / 2, y, { align: 'center' });
            y += 4;
            doc.text('WhatsApp: (31) 9971-0420 · contato@damasclean.com.br', W / 2, y, { align: 'center' });

            // ---- SAVE ----
            const nomeCliente = document.getElementById('nomeCliente').value.replace(/[^a-zA-ZÀ-ú\s]/g, '').trim().replace(/\s+/g, '_');
            const numOrc = document.getElementById('numOrcamento').value;
            doc.save(`Orcamento_${numOrc}_${nomeCliente}.pdf`);

            showToast('✅ PDF gerado com sucesso!');
        }
    </script>
</body>
</html>
